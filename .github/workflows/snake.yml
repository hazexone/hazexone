name: Generate Snake Animation

on:
  # run automatically every 12 hours
  schedule:
    - cron: "0 */12 * * *"
  # allow manual trigger
  workflow_dispatch:
  # run on every push to main
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake game from contribution grid
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: hazexone
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#8A2BE2&color_dots=#161b22,#4169E1,#00CED1,#8A2BE2,#ffffff

      - name: Push generated SVG to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
